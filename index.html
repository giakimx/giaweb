<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gia Kim - Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Roboto+Mono:wght@400;500&family=Permanent+Marker&family=Sedgwick+Ave+Display&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #ffffff;
        color: #171717;
      }
      .font-serif-accent {
        font-family: 'Playfair Display', serif;
      }
      .font-mono-accent {
        font-family: 'Roboto Mono', monospace;
      }
      .font-marker {
        font-family: 'Permanent Marker', cursive;
      }
      .font-graffiti {
        font-family: 'Sedgwick Ave Display', cursive;
      }
      /* Custom scrollbar for the chat */
      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .scrollbar-hide {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
      
      /* Subtle dot pattern instead of mesh gradient for technical feel */
      .bg-dot-pattern {
        background-color: #ffffff;
        background-image: radial-gradient(#e5e5e5 1px, transparent 1px);
        background-size: 24px 24px;
      }
    </style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
